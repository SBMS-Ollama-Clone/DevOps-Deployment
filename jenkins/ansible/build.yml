---
- hosts: localhost
  gather_facts: yes
  vars:
    image_tags: "{{ version | default('latest') }}"
    project_name: "{{ project_name }}"
    workspace: "{{ workspace }}"
  tasks:
    - name: Build the project using maven
      command: mvn clean package -DskipTests
      args:
        chdir: "{{ workspace }}"
