---
- hosts: localhost
  gather_facts: yes
  vars:
    workspace: "{{ workspace }}"
    registry: "{{ registry }}"
    image_tags: "{{ version | default('latest') }}"
  tasks:
    - name: Build the project using maven
      command: mvn clean package -DskipTests
      args:
        chdir: "{{ workspace }}"
    - name: Build the docker image
      command: docker build -t "{{ registry }}:{{ image_tags }}" .
      args:
        chdir: "{{ workspace }}"
