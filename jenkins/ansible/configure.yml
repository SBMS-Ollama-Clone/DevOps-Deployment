---
- hosts: localhost
  gather_facts: yes
  vars:
    git_branch: "{{ git_branch | default('main') }}"
    workspace: "{{ workspace }}"
    service_name: "{{ service_name }}"
    build_user: "{{ build_user | default('jenkins')}}"
  tasks:
    - name: Creates {{ service_name }} directory
      ansible.builtin.file:
        path: "{{ workspace }}"
        state: directory

    - name: Clone code if not exists
      ansible.builtin.git:
        repo: https://github.com/SBMS-Ollama-Clone/{{ service_name }}.git
        dest: "{{ workspace }}"
        single_branch: yes
        version: "{{ git_branch }}"
   
    - name: Echo the workspace
      ansible.builtin.debug:
        msg: "{{ workspace }}"
    - name: List the files in the workspace
      ansible.builtin.shell: ls -la "{{ workspace }}"
      register: ls_output